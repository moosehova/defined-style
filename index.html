<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defined Style Clothing | Industrial Tailoring & Branding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --dark: #050505;
            --gold: #D4AF37;
            --text: #F8FAFC;
            --accent-red: #E11D48;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 1. THE INDUSTRIAL BACKGROUND ENGINE */
        .industrial-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* High-impact industrial machinery visual */
            background: 
                linear-gradient(rgba(5, 5, 5, 0.92), rgba(5, 5, 5, 0.75)), 
                url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            z-index: -2;
            filter: grayscale(100%) contrast(110%);
            animation: panEffect 30s infinite alternate linear;
        }

        /* Subtle Blueprint Grid Texture */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(212, 175, 55, 0.15) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes panEffect {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.1) translate(-1%, -1%); }
        }

        /* 2. THE CONTENT BOX */
        .content { 
            padding: 40px; 
            z-index: 10; 
            max-width: 900px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. THE BRAND LOGO LOCKUP */
        .brand-header {
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .text-logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--text);
        }

        .text-logo span { color: var(--gold); }

        .sub-label {
            font-size: 0.7rem;
            letter-spacing: 14px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* 4. THE INDUSTRIAL HEADLINE */
        h1 {
            font-size: clamp(2.8rem, 11vw, 6rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -5px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .highlight { color: var(--gold); }

        p.description {
            color: #94a3b8;
            font-size: 1.15rem;
            margin-bottom: 45px;
            max-width: 550px;
            margin-inline: auto;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        /* 5. THE CTA BUTTON */
        .btn-whatsapp {
            padding: 22px 50px;
            background-color: var(--gold);
            color: #000;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            border: 2px solid var(--gold);
        }

        .btn-whatsapp:hover {
            transform: translateY(-10px);
            background-color: transparent;
            color: var(--gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
        }

        /* FOOTER CREDIT */
        .footer-tag {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .footer-tag span { color: #666; }
    </style>
</head>
<body>

    <div class="industrial-bg"></div>

    <div class="content">
        <div class="brand-header">
            <h2 class="text-logo">DEFINED <span>STYLE</span></h2>
            <p class="sub-label">CLOTHING</p>
        </div>
        
        <h1>MASTER <br> <span class="highlight">TAILORING</span> <br> IN PROGRESS</h1>
        
        <p class="description">
            Lusaka's premium manufacturing hub is undergoing a digital evolution. 
            Quality is worth the wait.
        </p>
        
        <a href="https://wa.me/260974373245?text=Hello%20DSC,%20I%20am%20inquiring%20about%20your%20manufacturing%20services." class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Instant Inquiry
        </a>
    </div>

    <p class="footer-tag">Powered by <span>Purple Worth Studios & Pwhost</span></p>

</body>
</html>
